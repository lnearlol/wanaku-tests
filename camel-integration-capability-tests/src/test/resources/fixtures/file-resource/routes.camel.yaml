- route:
    id: route-test-file-resource
    autoStartup: false
    from:
      id: from-test-file-resource
      uri: file
      parameters:
        directoryName: ${FILE_DIR}
        fileName: ${FILE_NAME}
        idempotent: false
        noop: true
      steps:
        - convertBodyTo:
            id: convertBodyTo-test-file-resource
            type: java.lang.String